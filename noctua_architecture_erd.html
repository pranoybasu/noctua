<script>
function sw(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'))
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'))
  document.getElementById(id).classList.add('on')
  btn.classList.add('on')
}
</script>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs'
const dark = matchMedia('(prefers-color-scheme: dark)').matches
await document.fonts.ready
mermaid.initialize({startOnLoad:false,theme:'base',fontFamily:'"Anthropic Sans",sans-serif',
  themeVariables:{darkMode:dark,fontSize:'13px',fontFamily:'"Anthropic Sans",sans-serif',
  lineColor:dark?'#9c9a92':'#73726c',textColor:dark?'#c2c0b6':'#3d3d3a'}})
const {svg} = await mermaid.render('erd-svg',`erDiagram
  USERS ||--o{ REPOS : owns
  REPOS ||--o{ PULL_REQUESTS : has
  REPOS ||--o{ TEAM_STATS : tracks
  PULL_REQUESTS ||--o{ ANALYSIS_JOBS : logs
  USERS {
    uuid id PK
    text github_id UK
    text login
    text avatar_url
    timestamptz created_at
  }
  REPOS {
    uuid id PK
    uuid user_id FK
    text full_name
    text review_persona
    bigint github_repo_id UK
    bigint webhook_id
  }
  PULL_REQUESTS {
    uuid id PK
    uuid repo_id FK
    int pr_number
    text author
    text status
    int quality_score
    bool preflight_passed
    jsonb code_dna
    text ai_summary
    jsonb security_issues
    jsonb suggestions
    timestamptz analyzed_at
  }
  TEAM_STATS {
    uuid id PK
    uuid repo_id FK
    text author
    int pr_count
    numeric avg_quality
    int security_catches
    timestamptz updated_at
  }
  ANALYSIS_JOBS {
    uuid id PK
    uuid pr_id FK
    text status
    text error_msg
    timestamptz started_at
    timestamptz completed_at
  }`)
document.getElementById('erd-c').innerHTML = svg
document.querySelectorAll('#erd-c svg .node').forEach(node=>{
  const fp=node.querySelector('path[d]'); if(!fp)return
  const d=fp.getAttribute('d'), nums=d.match(/-?[\d.]+/g)?.map(Number)
  if(!nums||nums.length<8)return
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]]
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect')
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8')
  for(const a of['fill','stroke','stroke-width','class','style'])if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a))
  fp.replaceWith(r)
})
</script>
